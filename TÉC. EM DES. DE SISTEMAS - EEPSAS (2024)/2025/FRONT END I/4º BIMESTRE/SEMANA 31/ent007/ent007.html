<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário - Rede Social</title>
</head>
<body>
    <h1>Cadastro de Usuário</h1>
    <form action="#" method="post" autocomplete="on">
        <fieldset>
            <legend>Informações Pessoais</legend>
            <p>
                <label for="nome">Nome completo:</label>
                <input type="text" id="nome" name="nome" required>
            </p>
            <p>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </p>
            <p>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required minlength="8">
            </p>
            <p>
                <label for="nascimento">Data de nascimento:</label>
                <input type="date" id="nascimento" name="nascimento" required>
            </p>
        </fieldset>
        <fieldset>
            <legend>Perfil</legend>
            <p>
                <label for="foto">Foto de perfil:</label>
                <input type="file" id="foto" name="foto">
            </p>
            <p>
                <label for="bio">Biografia:</label><br>
                <textarea id="bio" name="bio" rows="4" cols="40" placeholder="Fale um pouco sobre você..."></textarea>
            </p>
            <p>
                <label for="genero">Gênero:</label>
                <select id="genero" name="genero">
                    <option value="">Selecione</option>
                    <option value="masculino">Masculino</option>
                    <option value="feminino">Feminino</option>
                    <option value="outro">Outro</option>
                </select>
            </p>
            <p>
                <label>Interesses:</label><br>
                <input type="checkbox" id="musica" name="interesses" value="musica">
                <label for="musica">Música</label>
                <input type="checkbox" id="esportes" name="interesses" value="esportes">
                <label for="esportes">Esportes</label>
                <input type="checkbox" id="tecnologia" name="interesses" value="tecnologia">
                <label for="tecnologia">Tecnologia</label>
                <input type="checkbox" id="viagens" name="interesses" value="viagens">
                <label for="viagens">Viagens</label>
            </p>
        </fieldset>
        <p>
            <input type="submit" value="Cadastrar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
