<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form006</title>
</head>
<body>

    <h1>Formulario com Opções Extras</h1>

    <form action="form006.html" method="POST" autocomplete="on">
            <!--área do formulario-->
        <p>
            <label for="idcor">Cor:</label>
            <input type="color" name="cor" id="idcor">
        </p>
        <p>
            <label for="idrange">Range: </label>
            <input type="range" name="range" id="idrange" min="1" max="5" value="2">
        </p>
        <label for="idfile">Arquivo: </label>
        <input type="file" name="file" id="idfile">
        
            <!--área dos botões de envio-->
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>

    <p><a href="ex012.html">Voltar</a></p>
    
</body>
</html>
