<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form003</title>
</head>
<body>

    <h1>Formulario com Controle para Dattas</h1>

    <form action="form003.html" method="get" autocomplete="on">
        <!--área do formulário-->
            <p>
                <label for="idnome">Nome Completo: </label>
                <input type="text" name="nome" id="idnome" required maxlength="30" placeholder="Insira o nome completo" size="50" autocomplete="name">
            </p>
            <p>
                <label for="idmedia">Média</label>
                <input type="number" name="media" id="idmedia" min="0" max="10" placeholder="Medias de 0 a 10" step="0.5" required>
            </p>
            <p>
                <label for="idmes">Bimestre: </label>
                <input type="month" name="mes" id="idmes" value="2020-07" >
            </p>
            <p>
                <label for="iddia">Dia da Prova: </label>
                <input type="date" name="dia" id="iddia" value="2025-10-05">
            </p>
            <p>
                <label for="idhora">Hora da Prova: </label>
                <input type="time" name="Hora" id="idhora">
            </p>
            
        <!--área dos botões de envio-->
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>

    <a href="ex012.html">Voltar</a>
    
</body>
</html>
