        document.addEventListener('DOMContentLoaded', () => {
            const mainContent = document.getElementById('main-content');
            const navigation = document.getElementById('navigation');
            
            const setActiveLink = (view) => {
                document.querySelectorAll('.nav-link').forEach(link => {
                    link.classList.remove('bg-slate-100', 'text-slate-900', 'font-semibold');
                    link.classList.add('text-slate-600', 'font-medium', 'hover:bg-slate-100', 'hover:text-slate-900');
                    if (link.dataset.view === view) {
                        link.classList.add('bg-slate-100', 'text-slate-900', 'font-semibold');
                        link.classList.remove('text-slate-600', 'font-medium', 'hover:bg-slate-100', 'hover:text-slate-900');
                    }
                });
            };

            const renderHome = () => {
                mainContent.innerHTML = `
                    <div class="space-y-12">
                        <div>
                            <h2 class="text-2xl font-bold border-b border-slate-300 pb-3 mb-4">${courseData.ementa.titulo}</h2>
                            <p class="text-slate-600 mb-4">${courseData.ementa.objetivoGeral}</p>
                            <ul class="list-disc list-inside space-y-2 text-slate-700">
                                ${courseData.ementa.topicos.map(item => `<li>${item}</li>`).join('')}
                            </ul>
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold border-b border-slate-300 pb-3 mb-4">Foco de Cada Bimestre</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                ${courseData.focoBimestres.map(b => `
                                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                        <h3 class="font-bold text-lg text-slate-900">${b.bimestre}</h3>
                                        <p class="text-slate-600 mt-2">${b.foco}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
                setActiveLink('home');
            };

            const renderBimestre = (bimestreNum) => {
                const bimestreRanges = [
                    { start: 1, end: 11 }, { start: 12, end: 22 },
                    { start: 23, end: 28 }, { start: 29, end: 35 }
                ];
                const range = bimestreRanges[bimestreNum - 1];

                const semanasDoBimestre = courseData.planejamento.filter(
                    aula => aula.semana >= range.start && aula.semana <= range.end
                );

                mainContent.innerHTML = `
                    <h2 class="text-2xl font-bold border-b border-slate-300 pb-3 mb-6">${bimestreNum}º Bimestre - Planejamento Semanal</h2>
                    <div class="space-y-8">
                        ${semanasDoBimestre.map(aula => {
                            let titleSuffix = '';
                            if (aula.dayOfWeek === 2) { // 2 = Terça-feira
                                titleSuffix = ' <span class="text-sm font-medium text-amber-600 bg-amber-100 px-2 py-1 rounded-full">2 AULAS</span>';
                            } else if (aula.dayOfWeek === 6) { // Sábado com horário de terça
                                titleSuffix = ' <span class="text-sm font-medium text-amber-600 bg-amber-100 px-2 py-1 rounded-full">2 AULAS</span>';
                            }
                            
                            return `
                            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                <header class="border-b border-slate-200 pb-3 mb-4">
                                    <h3 class="font-bold text-lg text-slate-900 flex items-center">
                                        SEMANA ${aula.semana} - ${aula.data}
                                        <span class="ml-3">${titleSuffix}</span>
                                    </h3>
                                    <p class="text-sm font-semibold text-sky-600 mt-1">${aula.tema}</p>
                                </header>
                                <div>
                                    <h4 class="font-semibold text-slate-800">Objetivo:</h4>
                                    <p class="text-slate-600 mb-4">${aula.objetivo}</p>
                                    <h4 class="font-semibold text-slate-800">Tópicos (Registro da Aula):</h4>
                                    <p class="text-slate-600">${aula.topicos}</p>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                `;
                setActiveLink(`bimestre-${bimestreNum}`);
            };
            
            navigation.addEventListener('click', (e) => {
                e.preventDefault();
                const targetLink = e.target.closest('.nav-link');
                if (!targetLink) return;
                const view = targetLink.dataset.view;
                
                if (view === 'home') {
                    renderHome();
                } else if (view.startsWith('bimestre-')) {
                    const bimestreNum = parseInt(view.split('-')[1]);
                    renderBimestre(bimestreNum);
                }
            });

            renderHome();
        });
    </script>
</body>
</html>
