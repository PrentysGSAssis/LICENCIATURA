<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="OIP.ico" type="image/x-icon">
    <title>Inserindo Imagens</title>
</head>
<body>
    <h1>Testando Carregamento de Imagens</h1>
    <hr>
    
    <p>Abaixo está uma imagem carregada na mesma pasta do Index:</p>
    <br>
    <img src="html-255.png" alt="Logo HTML5 - Resolução: 255px"> <!--Para adicionar a imagem, basta apertar ctrl+espaço que irá exibir os arquivos na pasta-->
    
    <p>Agora é uma imagem carregada em um subpasta:</p>
    <br>
    <img src="imagens/css-255.png" alt="Logo CSS3 - Resolução 255px"> <!--Para imagens em subpastas é necessário adicionar o caminho da subpasta na source-->
    
    <p>Abaixo é uma imagem da internet:</p>
    <br>
    <img src="https://th.bing.com/th/id/R.637ccbf2b702b94a2cf9a3ff6cdd7dc2?rik=4PviroIyAyvkSw&riu=http%3a%2f%2fpluspng.com%2fimg-png%2fjavascript-logo-vector-png-java-script-js-logo-format-ai-213.png&ehk=xL7JBeI62pK9jcW8VVDv%2fKcP2QLCh7tBiFHGQ3%2bAedA%3d&risl=&pid=ImgRaw&r=0&sres=1&sresct=1" alt="Logo JavaScript"> <!--Imagens online eu dependo do servidor estar ativo e também preciso incluir a URL completa do arquivo-->
    
</body>
</html>
